# Hyperledger Explorer — visual blockchain browser for the SmartLedger Fabric network.
#
# Provides a web UI to inspect blocks, transactions, chaincode, peers, and
# channels.  Connects to the existing Fabric network via the `fabric_net`
# bridge created by docker-compose.fabric.yml (joined as external).
#
# Prerequisites:
#   1.  Fabric network is up: docker compose -f ../docker-compose.fabric.yml up -d
#   2.  Channel is created and chaincode is committed (per setup-fabric.sh)
#
# Start:
#   docker compose -f docker-compose.explorer.yml up -d
#
# Access:
#   http://localhost:8090
#   Login: exploreradmin / exploreradminpw
#
# NOTE: Explorer admin credentials are in connection-profile/smartledger-network.json
# (static JSON — cannot use env var substitution). These are local POC passwords only.
# For non-local deployment, replace the password in that JSON file.
#
# Stop:
#   docker compose -f docker-compose.explorer.yml down
#
# Wipe Explorer state (resync from genesis):
#   docker compose -f docker-compose.explorer.yml down -v

services:
  explorer-db:
    image: hyperledger/explorer-db:1.1.8
    container_name: smartledger-explorer-db
    hostname: explorerdb.mynetwork.com
    environment:
      DATABASE_DATABASE: fabricexplorer
      DATABASE_USERNAME:  hppoc
      DATABASE_PASSWORD:  ${EXPLORER_DB_PASSWORD:-password}
    volumes:
      - explorer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -q -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - fabric_net
    restart: unless-stopped

  explorer:
    image: hyperledger/explorer:1.1.8
    container_name: smartledger-explorer
    hostname: explorer.mynetwork.com
    environment:
      DATABASE_HOST:        explorerdb.mynetwork.com
      DATABASE_DATABASE:    fabricexplorer
      DATABASE_USERNAME:    hppoc
      DATABASE_PASSWD:      ${EXPLORER_DB_PASSWORD:-password}
      LOG_LEVEL_APP:        info
      LOG_LEVEL_DB:         info
      LOG_LEVEL_CONSOLE:    info
      LOG_CONSOLE_STDOUT:   "true"
      DISCOVERY_AS_LOCALHOST: "false"
    volumes:
      - ./config.json:/opt/explorer/app/platform/fabric/config.json:ro
      - ./connection-profile:/tmp/connection-profile:ro
      - ../crypto-material:/tmp/crypto:ro
      - explorer_walletstore:/opt/explorer/wallet
    ports:
      - "8090:8080"
    depends_on:
      explorer-db:
        condition: service_healthy
    networks:
      - fabric_net
    restart: unless-stopped

volumes:
  explorer_db_data:
  explorer_walletstore:

networks:
  fabric_net:
    name: smartledger_fabric_net
    external: true
