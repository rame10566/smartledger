##
## SmartLedger — Hyperledger Fabric Network
##
## Single-org test network for Phase 1+ live writes.
##
## Services:
##   ca.org1.smartledger.local  — Fabric CA for SmartLedgerOrg
##   orderer.orderer.smartledger.local  — Raft orderer
##   peer0.org1.smartledger.local — Peer with CouchDB state DB
##   couchdb                    — CouchDB for rich queries
##   cli                        — Admin CLI container for channel + chaincode setup
##
## Usage:
##   cd infra/fabric
##   ./scripts/setup-fabric.sh        # first-time setup (crypto + channel + cc deploy)
##   docker compose -f docker-compose.fabric.yml up -d
##
## Fabric version: 2.5.x (LTS)
##

version: "3.8"

x-fabric-common: &fabric-common
  networks:
    - fabric_net

volumes:
  orderer_data:
  peer0_data:
  couchdb_data:

networks:
  fabric_net:
    name: smartledger_fabric_net
    driver: bridge

services:

  # ── Fabric CA (SmartLedgerOrg) ──────────────────────────────────────────────
  ca.org1.smartledger.local:
    image: hyperledger/fabric-ca:1.5
    <<: *fabric-common
    environment:
      FABRIC_CA_HOME:               /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME:     ca-org1
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT:        7054
    ports:
      - "7054:7054"
    command: sh -c "fabric-ca-server start -b admin:adminpw -d"
    volumes:
      - ./crypto-material/peerOrganizations/org1.smartledger.local/ca:/etc/hyperledger/fabric-ca-server

  # ── Orderer ────────────────────────────────────────────────────────────────
  orderer.orderer.smartledger.local:
    image: hyperledger/fabric-orderer:2.5
    <<: *fabric-common
    environment:
      ORDERER_GENERAL_LOGLEVEL:                  INFO
      ORDERER_GENERAL_LISTENADDRESS:             0.0.0.0
      ORDERER_GENERAL_LISTENPORT:                7050
      ORDERER_GENERAL_LOCALMSPID:                OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR:               /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED:               "true"
      ORDERER_GENERAL_TLS_PRIVATEKEY:            /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE:           /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS:               "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_BOOTSTRAPMETHOD:           none
      ORDERER_CHANNELPARTICIPATION_ENABLED:      "true"
      ORDERER_ADMIN_TLS_ENABLED:                 "true"
      ORDERER_ADMIN_TLS_CERTIFICATE:             /var/hyperledger/orderer/tls/server.crt
      ORDERER_ADMIN_TLS_PRIVATEKEY:              /var/hyperledger/orderer/tls/server.key
      ORDERER_ADMIN_TLS_ROOTCAS:                 "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_ADMIN_TLS_CLIENTROOTCAS:           "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_ADMIN_LISTENADDRESS:               0.0.0.0:7053
      ORDERER_OPERATIONS_LISTENADDRESS:          0.0.0.0:9443
      ORDERER_METRICS_PROVIDER:                  prometheus
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    volumes:
      - ./crypto-material/ordererOrganizations/orderer.smartledger.local/orderers/orderer.orderer.smartledger.local/msp:/var/hyperledger/orderer/msp
      - ./crypto-material/ordererOrganizations/orderer.smartledger.local/orderers/orderer.orderer.smartledger.local/tls:/var/hyperledger/orderer/tls
      - orderer_data:/var/hyperledger/production/orderer
    depends_on:
      - ca.org1.smartledger.local

  # ── CouchDB (world state for rich queries) ─────────────────────────────────
  couchdb:
    image: couchdb:3.3
    <<: *fabric-common
    environment:
      COUCHDB_USER:     admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

  # ── Peer ───────────────────────────────────────────────────────────────────
  peer0.org1.smartledger.local:
    image: hyperledger/fabric-peer:2.5
    <<: *fabric-common
    environment:
      CORE_VM_ENDPOINT:                         unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE:    smartledger_fabric_net
      FABRIC_LOGGING_SPEC:                      INFO
      CORE_PEER_TLS_ENABLED:                    "true"
      CORE_PEER_PROFILE_ENABLED:                "false"
      CORE_PEER_TLS_CERT_FILE:                  /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE:                   /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE:              /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID:                             peer0.org1.smartledger.local
      CORE_PEER_ADDRESS:                        peer0.org1.smartledger.local:7051
      CORE_PEER_LISTENADDRESS:                  0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS:               peer0.org1.smartledger.local:7052
      CORE_PEER_CHAINCODELISTENADDRESS:         0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP:               peer0.org1.smartledger.local:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT:        peer0.org1.smartledger.local:7051
      CORE_PEER_LOCALMSPID:                     SmartLedgerOrgMSP
      CORE_PEER_MSPCONFIGPATH:                  /etc/hyperledger/fabric/msp
      CORE_OPERATIONS_LISTENADDRESS:            peer0.org1.smartledger.local:9444
      CORE_METRICS_PROVIDER:                    prometheus
      CORE_STATE_DATABASE:                      CouchDB
      CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS:  couchdb:5984
      CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME:        admin
      CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD:        adminpw
    ports:
      - "7051:7051"
      - "9444:9444"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-material/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-material/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/tls:/etc/hyperledger/fabric/tls
      - peer0_data:/var/hyperledger/production
    depends_on:
      - orderer.orderer.smartledger.local
      - couchdb

  # ── Admin CLI ──────────────────────────────────────────────────────────────
  cli:
    image: hyperledger/fabric-tools:2.5
    <<: *fabric-common
    tty: true
    stdin_open: true
    environment:
      GOPATH:                         /opt/gopath
      CORE_VM_ENDPOINT:               unix:///host/var/run/docker.sock
      FABRIC_LOGGING_SPEC:            INFO
      CORE_PEER_ID:                   cli
      CORE_PEER_ADDRESS:              peer0.org1.smartledger.local:7051
      CORE_PEER_LOCALMSPID:           SmartLedgerOrgMSP
      CORE_PEER_TLS_ENABLED:          "true"
      CORE_PEER_TLS_CERT_FILE:        /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/tls/server.crt
      CORE_PEER_TLS_KEY_FILE:         /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE:    /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH:        /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.smartledger.local/users/Admin@org1.smartledger.local/msp
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-material:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/artifacts
      - ../chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    depends_on:
      - peer0.org1.smartledger.local
