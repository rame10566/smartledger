version: "3.9"

# SmartLedger — Infrastructure only (for local development)
#
# Starts only PostgreSQL and Redis. Run Python services directly with uv
# for faster iteration (no image rebuild needed on code changes).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   ./scripts/dev_start.sh          # starts all services locally
#   ./scripts/run_origination_demo.py  # trigger E2E demo

services:

  postgres:
    image: postgres:16-alpine
    container_name: smartledger-postgres
    environment:
      POSTGRES_DB: smartledger
      POSTGRES_USER: smartledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartledger_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartledger-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  default:
    name: smartledger-dev-network
