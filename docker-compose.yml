version: "3.9"

# SmartLedger — Local Development Stack
# Usage: docker compose up -d
# Starts: PostgreSQL, Redis, and all Python services
# Note: Hyperledger Fabric has its own compose in infra/fabric/

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: smartledger-postgres
    environment:
      POSTGRES_DB: smartledger
      POSTGRES_USER: smartledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartledger_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartledger-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MCP Servers (Built) ───────────────────────────────────────────────────

  mcp-validation:
    build:
      context: .
      dockerfile: infra/docker/mcp_validation.Dockerfile
    container_name: smartledger-mcp-validation
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=mcp-validation
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-ledger:
    build:
      context: .
      dockerfile: infra/docker/mcp_ledger.Dockerfile
    container_name: smartledger-mcp-ledger
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - WRITE_GUARD=${WRITE_GUARD:-true}
      - PHASE=${PHASE:-0}
      # ── Hyperledger Fabric (Phase 1+, WRITE_GUARD=false) ────────────────────
      # Peer / orderer endpoints (DNS names on smartledger_fabric_net)
      - FABRIC_PEER_ENDPOINT=peer0.org1.smartledger.local:7051
      - FABRIC_ORDERER_ENDPOINT=orderer.orderer.smartledger.local:7050
      - FABRIC_CHANNEL=${FABRIC_CHANNEL:-smartledger-channel}
      - FABRIC_CHAINCODE=${FABRIC_CHAINCODE:-smartledger-cc}
      - FABRIC_MSP_ID=${FABRIC_MSP_ID:-SmartLedgerOrgMSP}
      # TLS / crypto paths (inside container; crypto-material mounted below)
      - FABRIC_TLS_CERT_PATH=/fabric/crypto/peerOrganizations/org1.smartledger.local/peers/peer0.org1.smartledger.local/tls/ca.crt
      - FABRIC_ORDERER_TLS_PATH=/fabric/crypto/ordererOrganizations/orderer.smartledger.local/orderers/orderer.orderer.smartledger.local/tls/ca.crt
      - FABRIC_ADMIN_MSP_PATH=/fabric/crypto/peerOrganizations/org1.smartledger.local/users/Admin@org1.smartledger.local/msp
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - FABRIC_BIN_PATH=/usr/local/bin
      # ── Service metadata ────────────────────────────────────────────────────
      - SERVICE_NAME=mcp-ledger
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
      - JWT_SECRET=${JWT_SECRET:-change-me-jwt-secret}
      - VALIDATION_JWT_SECRET=${VALIDATION_JWT_SECRET:-change-me-validation-jwt-secret}
    volumes:
      # Crypto material mount (required when WRITE_GUARD=false / Phase 1+)
      - ./infra/fabric/crypto-material:/fabric/crypto:ro
    networks:
      - default
      - fabric_net
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  mcp-semantic-ai:
    build:
      context: .
      dockerfile: infra/docker/mcp_semantic_ai.Dockerfile
    container_name: smartledger-mcp-semantic-ai
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SERVICE_NAME=mcp-semantic-ai
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  mcp-reporting:
    build:
      context: .
      dockerfile: infra/docker/mcp_reporting.Dockerfile
    container_name: smartledger-mcp-reporting
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - SERVICE_NAME=mcp-reporting
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Simulated MCP Servers ─────────────────────────────────────────────────

  mcp-simulated:
    build:
      context: .
      dockerfile: infra/docker/mcp_simulated.Dockerfile
    container_name: smartledger-mcp-simulated
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=mcp-simulated
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
    ports:
      - "8010:8010"   # oracle_los
      - "8011:8011"   # salesforce_los
      - "8012:8012"   # llas
      - "8013:8013"   # crm
      - "8014:8014"   # payment
      - "8015:8015"   # insurance
      - "8016:8016"   # dealer
      - "8017:8017"   # customer_portal
      - "8018:8018"   # mobile_app
      - "8019:8019"   # ivr
      - "8020:8020"   # rules_engine
      # - "8021:8021"   # pricing_engine — host port in use; container-internal still works
      - "8022:8022"   # integration_system
    depends_on:
      redis:
        condition: service_healthy

  # ─── AI Agent + Event Bus ──────────────────────────────────────────────────

  agent:
    build:
      context: .
      dockerfile: infra/docker/agent.Dockerfile
    container_name: smartledger-agent
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - MCP_VALIDATION_URL=http://mcp-validation:8001/mcp
      - MCP_LEDGER_URL=http://mcp-ledger:8002/mcp
      - MCP_SEMANTIC_AI_URL=http://mcp-semantic-ai:8003/mcp
      - MCP_REPORTING_URL=http://mcp-reporting:8004/mcp
      - MCP_ORACLE_LOS_URL=http://mcp-simulated:8010/mcp
      - MCP_LLAS_URL=http://mcp-simulated:8012/mcp
      - MCP_PAYMENT_URL=http://mcp-simulated:8014/mcp
      - MCP_RULES_ENGINE_URL=http://mcp-simulated:8020/mcp
      - MCP_PRICING_ENGINE_URL=http://mcp-simulated:8021/mcp
      - MCP_INTEGRATION_URL=http://mcp-simulated:8022/mcp
      - PHASE=${PHASE:-0}
      - SERVICE_NAME=agent
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-validation:
        condition: service_started
      mcp-ledger:
        condition: service_started

  # ─── Dashboard API ─────────────────────────────────────────────────────────

  dashboard-api:
    build:
      context: .
      dockerfile: infra/docker/dashboard_api.Dockerfile
    container_name: smartledger-dashboard-api
    environment:
      - DATABASE_URL=postgresql://smartledger:${POSTGRES_PASSWORD:-smartledger_dev}@postgres:5432/smartledger
      - MCP_LEDGER_URL=http://mcp-ledger:8002/mcp
      - MCP_VALIDATION_URL=http://mcp-validation:8001/mcp
      - MCP_REPORTING_URL=http://mcp-reporting:8004/mcp
      - MCP_LLAS_URL=http://mcp-simulated:8012/mcp
      - SERVICE_NAME=dashboard-api
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Dashboard UI ──────────────────────────────────────────────────────────

  dashboard-ui:
    build:
      context: apps/dashboard-ui
      dockerfile: Dockerfile
      args:
        # Baked into next build so rewrites() resolves the correct upstream
        API_URL: http://dashboard-api:8000
    container_name: smartledger-dashboard-ui
    ports:
      - "3000:3000"
    depends_on:
      - dashboard-api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: smartledger-network
  # External Fabric network — created by infra/fabric/docker-compose.fabric.yml
  # Only joined by mcp-ledger when Phase 1 (WRITE_GUARD=false) is active.
  fabric_net:
    external: true
    name: smartledger_fabric_net
